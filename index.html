<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Recruitment - Global Talent Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Netlify Forms: hidden static forms for SPA detection -->
    <form name="partnership" netlify netlify-honeypot="bot-field" hidden>
      <input name="fullName" />
      <input name="email" />
      <input name="phone" />
      <input name="location" />
      <input name="experience" />
      <input name="industry" />
      <input name="availability" />
      <textarea name="motivation"></textarea>
    </form>
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input name="name" />
      <input name="email" />
      <input name="type" />
      <input name="service" />
      <input name="cv" />
      <textarea name="message"></textarea>
    </form>
    <form name="newsletter" netlify netlify-honeypot="bot-field" hidden>
      <input name="email" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
